<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparador de Modelos — Ernesto Investing AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
  .cabecera-pagina { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 22px; flex-wrap: wrap; gap: 14px; }
  .cabecera-pagina h1 { font-size: 26px; }

  .tabla-comparador { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  .tabla-comparador th, .tabla-comparador td { padding: 11px 10px; text-align: left; border-bottom: 1px solid var(--color-veta); }
  .tabla-comparador th { color: var(--color-hueso-tenue); font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.05em; }
  .tabla-comparador td.dato { font-family: var(--fuente-datos); }
  .tabla-comparador tr:hover { background: var(--color-roca-clara); cursor: pointer; }
  .tabla-comparador tr.fila-seleccionada { background: rgba(181, 113, 60, 0.1); }

  .grid-dos-columnas { display: grid; grid-template-columns: 1.3fr 1fr; gap: 18px; margin-top: 18px; }
  @media (max-width: 1000px) { .grid-dos-columnas { grid-template-columns: 1fr; } }
</style>
</head>
<body data-pagina="comparador">

<div class="app-layout">
  <div id="sidebar-contenedor"></div>

  <main class="contenido-principal">
    <div class="topbar-movil">
      <strong style="font-family: var(--fuente-display);">Ernesto Investing AI</strong>
      <button id="boton-menu-movil" class="boton boton-secundario" aria-label="Abrir menú">☰</button>
    </div>

    <div class="cabecera-pagina">
      <h1>Comparador de modelos</h1>
      <select id="selector-ticker">
        <option value="FSM">FSM</option>
        <option value="VOLCABC1.LM">VOLCABC1.LM</option>
        <option value="ABX.TO">ABX.TO</option>
        <option value="BVN" selected>BVN</option>
        <option value="BHP">BHP</option>
      </select>
    </div>

    <div id="aviso-api" class="mensaje-error oculto" style="display:none;">
      No se pudo conectar con la API. Verifica la URL en <a href="configuracion.html" style="text-decoration:underline;">Configuración</a>.
    </div>

    <div class="tarjeta">
      <table class="tabla-comparador" id="tabla-metricas">
        <thead>
          <tr>
            <th>Modelo</th><th>Accuracy</th><th>Precision</th><th>Recall</th><th>F1</th><th>RMSE</th>
          </tr>
        </thead>
        <tbody id="cuerpo-tabla-metricas">
          <tr><td colspan="6"><div class="skeleton" style="height:18px;"></div></td></tr>
        </tbody>
      </table>
    </div>

    <div class="grid-dos-columnas">
      <div class="tarjeta">
        <h3 style="font-size:13px; text-transform:uppercase; color:var(--color-hueso-tenue); margin-bottom:14px;">
          Radar comparativo (F1-score)
        </h3>
        <div id="grafico-radar" style="min-height:340px;"></div>
      </div>

      <div class="tarjeta">
        <h3 style="font-size:13px; text-transform:uppercase; color:var(--color-hueso-tenue); margin-bottom:14px;">
          Curva de entrenamiento — <span id="titulo-modelo-curva">selecciona un modelo</span>
        </h3>
        <div id="grafico-curva" style="min-height:340px;"></div>
      </div>
    </div>
  </main>
</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/shell.js"></script>
<script>
  const NOMBRES_MODELO = {
    svc: "SVC", lstm: "LSTM", bilstm: "BiLSTM", gru: "GRU",
    simplernn: "SimpleRNN", lstm_regressor: "Regresor LSTM",
  };
  let modelosCargados = [];

  document.addEventListener("DOMContentLoaded", () => {
    cargarComparador();
    document.getElementById("selector-ticker").addEventListener("change", cargarComparador);
  });

  async function cargarComparador() {
    const ticker = document.getElementById("selector-ticker").value;
    try {
      const { modelos } = await ErnestoAPI.get(`/api/metricas/comparador/${ticker}`);
      modelosCargados = modelos;
      dibujarTabla(modelos);
      dibujarRadar(modelos);

      const primeraRnn = modelos.find((m) => m.historial_entrenamiento);
      if (primeraRnn) dibujarCurvaEntrenamiento(primeraRnn);
    } catch (error) {
      manejarError(error);
    }
  }

  function dibujarTabla(modelos) {
    const cuerpo = document.getElementById("cuerpo-tabla-metricas");
    cuerpo.innerHTML = modelos.map((m) => `
      <tr data-modelo="${m.modelo}" class="fila-modelo">
        <td>${NOMBRES_MODELO[m.modelo] || m.modelo}</td>
        <td class="dato">${formatearPct(m.metricas.accuracy)}</td>
        <td class="dato">${formatearPct(m.metricas.precision)}</td>
        <td class="dato">${formatearPct(m.metricas.recall)}</td>
        <td class="dato">${formatearPct(m.metricas.f1)}</td>
        <td class="dato">${m.metricas.rmse != null ? "$" + m.metricas.rmse.toFixed(3) : "—"}</td>
      </tr>
    `).join("");

    document.querySelectorAll(".fila-modelo").forEach((fila) => {
      fila.addEventListener("click", () => {
        document.querySelectorAll(".fila-modelo").forEach((f) => f.classList.remove("fila-seleccionada"));
        fila.classList.add("fila-seleccionada");
        const modelo = modelosCargados.find((m) => m.modelo === fila.dataset.modelo);
        if (modelo?.historial_entrenamiento) dibujarCurvaEntrenamiento(modelo);
      });
    });
  }

  function formatearPct(valor) {
    return valor != null ? (valor * 100).toFixed(1) + "%" : "—";
  }

  function dibujarRadar(modelos) {
    const clasificadores = modelos.filter((m) => m.metricas.f1 != null);
    if (!clasificadores.length) return;

    Plotly.newPlot("grafico-radar", [{
      type: "scatterpolar",
      r: [...clasificadores.map((m) => m.metricas.f1), clasificadores[0].metricas.f1],
      theta: [...clasificadores.map((m) => NOMBRES_MODELO[m.modelo]), NOMBRES_MODELO[clasificadores[0].modelo]],
      fill: "toself", line: { color: "#b5713c" }, fillcolor: "rgba(181,113,60,0.25)",
    }], {
      paper_bgcolor: "transparent",
      font: { color: "#e9e6e0", family: "Inter, sans-serif", size: 11 },
      polar: { radialaxis: { visible: true, range: [0, 1], gridcolor: "#333c4d" }, angularaxis: { gridcolor: "#333c4d" }, bgcolor: "transparent" },
      margin: { t: 20, b: 20 }, showlegend: false,
    }, { responsive: true, displayModeBar: false });
  }

  function dibujarCurvaEntrenamiento(modelo) {
    document.getElementById("titulo-modelo-curva").textContent = NOMBRES_MODELO[modelo.modelo];
    const historial = modelo.historial_entrenamiento;

    Plotly.newPlot("grafico-curva", [
      { x: historial.map((h) => h.epoca), y: historial.map((h) => h.accuracy), name: "Accuracy (train)", type: "scatter", mode: "lines", line: { color: "#3f9463" } },
      { x: historial.map((h) => h.epoca), y: historial.map((h) => h.val_accuracy), name: "Accuracy (val)", type: "scatter", mode: "lines", line: { color: "#3f9463", dash: "dot" } },
      { x: historial.map((h) => h.epoca), y: historial.map((h) => h.loss), name: "Loss (train)", type: "scatter", mode: "lines", line: { color: "#c25b52" }, yaxis: "y2" },
      { x: historial.map((h) => h.epoca), y: historial.map((h) => h.val_loss), name: "Loss (val)", type: "scatter", mode: "lines", line: { color: "#c25b52", dash: "dot" }, yaxis: "y2" },
    ], {
      paper_bgcolor: "transparent", plot_bgcolor: "transparent",
      font: { color: "#e9e6e0", family: "Inter, sans-serif", size: 11 },
      margin: { t: 20, r: 40, l: 40, b: 30 },
      xaxis: { title: "Época", gridcolor: "#262d3a" },
      yaxis: { title: "Accuracy", gridcolor: "#262d3a", range: [0, 1] },
      yaxis2: { title: "Loss", overlaying: "y", side: "right" },
      legend: { orientation: "h", y: -0.2 },
    }, { responsive: true, displayModeBar: false });
  }

  function manejarError(error) {
    if (error.codigo === "API_NO_CONFIGURADA" || error.codigo === "SIN_CONEXION") {
      document.getElementById("aviso-api").style.display = "block";
    }
    document.getElementById("cuerpo-tabla-metricas").innerHTML =
      `<tr><td colspan="6" class="estado-vacio">No se pudieron cargar las métricas.</td></tr>`;
  }
</script>
</body>
</html>
